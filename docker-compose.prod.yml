services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-bullseye
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: rosary_root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rosary_root_password_2024}
      MONGO_INITDB_DATABASE: rosary-app
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "rosary_root", "-p", "${MONGO_ROOT_PASSWORD:-rosary_root_password_2024}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"

volumes:
  mongodb_data:
    driver: local
