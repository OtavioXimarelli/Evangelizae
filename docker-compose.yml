services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-bullseye
    container_name: rosary-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-rosary_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rosary_secret_2024}
      MONGO_INITDB_DATABASE: rosary-app
    volumes:
      - mongodb_data:/data/db
    networks:
      - rosary-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Next.js Frontend
  frontend:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: rosary-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - rosary-network

volumes:
  mongodb_data:
    driver: local

networks:
  rosary-network:
    driver: bridge
